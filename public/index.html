<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>llms.txt Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --surface: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --success: #059669;
      --error: #dc2626;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    /* ---- Header ---- */
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .hero h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.15;
    }
    .hero p {
      margin-top: 10px;
      color: var(--text-muted);
      font-size: 1rem;
    }
    .hero a { color: var(--accent); text-decoration: none; }
    .hero a:hover { text-decoration: underline; }

    /* ---- Card ---- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      width: 100%;
      max-width: 680px;
    }

    /* ---- Form ---- */
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    input[type="url"], input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      background: var(--surface);
      color: var(--text);
    }
    input[type="url"]:focus, input[type="number"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }
    input[type="number"] { width: 100%; }

    details.options {
      margin-top: 16px;
    }
    details.options summary {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.options summary::before {
      content: '▶';
      font-size: 10px;
      transition: transform .2s;
    }
    details.options[open] summary::before { transform: rotate(90deg); }
    details.options summary::-webkit-details-marker { display: none; }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 14px;
    }

    .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      margin-top: 20px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

    .btn-sm {
      padding: 7px 14px;
      font-size: 13px;
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-sm:hover { background: var(--border); }

    /* ---- Divider ---- */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ---- Progress ---- */
    #progress { display: none; }
    .progress-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      text-align: center;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--accent-light);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-label {
      font-weight: 600;
      font-size: 15px;
    }
    .progress-url {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 480px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .progress-count {
      font-size: 13px;
      color: var(--accent);
      font-weight: 600;
    }

    /* ---- Error ---- */
    #error-box {
      display: none;
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--error);
    }

    /* ---- Result ---- */
    #result { display: none; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .result-stats {
      font-size: 13px;
      color: var(--text-muted);
    }
    .result-stats strong { color: var(--success); }
    .result-actions { display: flex; gap: 8px; }

    textarea#output {
      width: 100%;
      height: 360px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fafafa;
      color: var(--text);
      resize: vertical;
      outline: none;
    }
    textarea#output:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,70,229,.12);
    }

    /* ---- Footer ---- */
    footer {
      margin-top: 32px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-badge">AI-Ready</div>
    <h1>llms.txt Generator</h1>
    <p>
      Crawl any website and generate a structured
      <a href="https://llmstxt.org" target="_blank" rel="noopener">llms.txt</a> file instantly.
    </p>
  </div>

  <div class="card">

    <!-- Form -->
    <form id="generate-form">
      <label for="url-input">Website URL</label>
      <input
        type="url"
        id="url-input"
        placeholder="https://example.com"
        required
        autocomplete="off"
        spellcheck="false"
      />

      <details class="options">
        <summary>Advanced options</summary>
        <div class="options-grid">
          <div>
            <label for="max-depth">Max depth</label>
            <input type="number" id="max-depth" value="3" min="1" max="10" />
            <p class="hint">How many link levels deep to crawl</p>
          </div>
          <div>
            <label for="max-pages">Max pages</label>
            <input type="number" id="max-pages" value="50" min="1" max="200" />
            <p class="hint">Maximum number of pages to visit</p>
          </div>
        </div>
      </details>

      <button type="submit" class="btn btn-primary" id="generate-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Generate llms.txt
      </button>
    </form>

    <!-- Progress -->
    <div id="progress">
      <div class="divider"></div>
      <div class="progress-inner">
        <div class="spinner"></div>
        <div class="progress-label">Crawling website…</div>
        <div class="progress-url" id="progress-url"></div>
        <div class="progress-count" id="progress-count"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="error-box"></div>

    <!-- Result -->
    <div id="result">
      <div class="divider"></div>
      <div class="result-header">
        <span class="result-stats" id="result-stats"></span>
        <div class="result-actions">
          <button class="btn btn-sm" id="copy-btn">Copy</button>
          <button class="btn btn-sm" id="download-btn">Download</button>
        </div>
      </div>
      <textarea id="output" readonly spellcheck="false"></textarea>
    </div>

  </div>

  <footer>
    Conforms to the <a href="https://llmstxt.org" target="_blank" rel="noopener">llms.txt specification</a>
  </footer>

  <script>
    const form = document.getElementById('generate-form');
    const urlInput = document.getElementById('url-input');
    const maxDepthInput = document.getElementById('max-depth');
    const maxPagesInput = document.getElementById('max-pages');
    const generateBtn = document.getElementById('generate-btn');

    const progressSection = document.getElementById('progress');
    const progressUrl = document.getElementById('progress-url');
    const progressCount = document.getElementById('progress-count');

    const errorBox = document.getElementById('error-box');

    const resultSection = document.getElementById('result');
    const resultStats = document.getElementById('result-stats');
    const outputArea = document.getElementById('output');
    const copyBtn = document.getElementById('copy-btn');
    const downloadBtn = document.getElementById('download-btn');

    let currentSource = null;

    function showSection(id) {
      progressSection.style.display = 'none';
      errorBox.style.display = 'none';
      resultSection.style.display = 'none';
      if (id === 'progress') progressSection.style.display = 'block';
      if (id === 'error') errorBox.style.display = 'block';
      if (id === 'result') resultSection.style.display = 'block';
    }

    function setLoading(loading) {
      generateBtn.disabled = loading;
      generateBtn.innerHTML = loading
        ? `<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Crawling…`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Generate llms.txt`;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Close any existing stream
      if (currentSource) { currentSource.close(); currentSource = null; }

      const url = urlInput.value.trim();
      const maxDepth = maxDepthInput.value;
      const maxPages = maxPagesInput.value;

      const params = new URLSearchParams({ url, maxDepth, maxPages });

      setLoading(true);
      progressUrl.textContent = '';
      progressCount.textContent = '';
      showSection('progress');

      const evtSource = new EventSource(`/api/generate?${params}`);
      currentSource = evtSource;

      evtSource.addEventListener('progress', (e) => {
        const data = JSON.parse(e.data);
        progressUrl.textContent = data.url;
        progressCount.textContent = `${data.pagesFound} page${data.pagesFound === 1 ? '' : 's'} found`;
      });

      evtSource.addEventListener('done', (e) => {
        const data = JSON.parse(e.data);
        evtSource.close();
        currentSource = null;

        outputArea.value = data.llmsTxt;
        resultStats.innerHTML = `<strong>${data.pagesFound} page${data.pagesFound === 1 ? '' : 's'}</strong> crawled`;
        setLoading(false);
        showSection('result');
        outputArea.scrollTop = 0;
      });

      evtSource.addEventListener('error', (e) => {
        evtSource.close();
        currentSource = null;

        let message = 'An unexpected error occurred.';
        try { message = JSON.parse(e.data).message; } catch {}

        errorBox.textContent = `Error: ${message}`;
        setLoading(false);
        showSection('error');
      });

      // Also handle connection-level errors (network down, etc.)
      evtSource.onerror = () => {
        if (evtSource.readyState === EventSource.CLOSED) return;
        evtSource.close();
        currentSource = null;
        errorBox.textContent = 'Connection lost. Please try again.';
        setLoading(false);
        showSection('error');
      };
    });

    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(outputArea.value);
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy'; }, 2000);
      } catch {
        outputArea.select();
        document.execCommand('copy');
      }
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([outputArea.value], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'llms.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    });
  </script>
</body>
</html>
