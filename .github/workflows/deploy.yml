name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      crawler: ${{ steps.filter.outputs.crawler }}
      lambdas: ${{ steps.filter.outputs.lambdas }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # shared changes affect everything downstream
          SHARED=$(echo "$CHANGED" | grep -c "^packages/shared/" || true)

          echo "web=$( (echo "$CHANGED" | grep -q "^packages/web/" || [ "$SHARED" -gt 0 ]) && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "api=$( (echo "$CHANGED" | grep -q "^packages/api/" || echo "$CHANGED" | grep -q "^prisma/" || [ "$SHARED" -gt 0 ]) && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "crawler=$( (echo "$CHANGED" | grep -q "^packages/crawler/" || [ "$SHARED" -gt 0 ]) && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "lambdas=$( (echo "$CHANGED" | grep -q "^packages/consumer/" || echo "$CHANGED" | grep -q "^packages/generator/" || echo "$CHANGED" | grep -q "^packages/monitor/" || [ "$SHARED" -gt 0 ]) && echo true || echo false )" >> $GITHUB_OUTPUT
          echo "infra=$( echo "$CHANGED" | grep -q "^infra/" && echo true || echo false )" >> $GITHUB_OUTPUT

  deploy-spa:
    needs: [test, changes]
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: cd packages/web && VITE_API_URL=${{ secrets.API_URL }} npx vite build
      - run: aws s3 sync packages/web/dist s3://${{ secrets.SPA_BUCKET }} --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-api:
    needs: [test, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --provenance=false -t ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }} -t ${{ secrets.ECR_REPOSITORY_URL }}:latest -f packages/api/Dockerfile .
          docker push ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REPOSITORY_URL }}:latest
      - run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

  deploy-crawler:
    needs: [test, changes]
    if: needs.changes.outputs.crawler == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --provenance=false -t ${{ secrets.CRAWLER_ECR_URL }}:${{ github.sha }} -t ${{ secrets.CRAWLER_ECR_URL }}:latest -f packages/crawler/Dockerfile .
          docker push ${{ secrets.CRAWLER_ECR_URL }}:${{ github.sha }}
          docker push ${{ secrets.CRAWLER_ECR_URL }}:latest
      - run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.PROJECT }}-${{ secrets.ENVIRONMENT }}-crawler \
            --image-uri ${{ secrets.CRAWLER_ECR_URL }}:${{ github.sha }}

  deploy-lambdas:
    needs: [test, changes]
    if: needs.changes.outputs.lambdas == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [consumer, generator, monitor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npx esbuild packages/${{ matrix.lambda }}/src/index.ts --bundle --platform=node --target=node20 --format=cjs --outfile=/tmp/${{ matrix.lambda }}.js "--external:@aws-sdk/*" --external:playwright-core
      - run: |
          mkdir -p /tmp/lambda-${{ matrix.lambda }}
          cp /tmp/${{ matrix.lambda }}.js /tmp/lambda-${{ matrix.lambda }}/index.js
          cd /tmp/lambda-${{ matrix.lambda }} && zip -r $GITHUB_WORKSPACE/${{ matrix.lambda }}.zip .
      - run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.PROJECT }}-${{ secrets.ENVIRONMENT }}-${{ matrix.lambda }} \
            --zip-file fileb://${{ matrix.lambda }}.zip

  terraform:
    needs: [test, changes]
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform apply -auto-approve -var="jwt_secret=${{ secrets.JWT_SECRET }}" -var="db_password=${{ secrets.DB_PASSWORD }}" -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" -var="google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" -var="gh_oauth_client_id=${{ secrets.GH_OAUTH_CLIENT_ID }}" -var="gh_oauth_client_secret=${{ secrets.GH_OAUTH_CLIENT_SECRET }}"

  smoke-test:
    needs: [deploy-spa, deploy-api, deploy-crawler, deploy-lambdas, terraform]
    # Run whenever at least one deploy succeeded. Skipped `needs` jobs report
    # result=skipped, so we explicitly allow that and only fail on real failures.
    if: |
      always() &&
      !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for ECS to stabilize
        # deploy-api only pushes the image + forces redeployment; give ECS a
        # moment to cycle tasks before we hit /api/health.
        if: needs.deploy-api.result == 'success'
        run: |
          aws configure set region ${{ env.AWS_REGION }}
          aws ecs wait services-stable \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --services ${{ secrets.ECS_SERVICE }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Run smoke tests
        run: ./scripts/smoke-test.sh
        env:
          API_BASE: https://api.llmtxtgenerator.online
          SPA_BASE: https://llmtxtgenerator.online
