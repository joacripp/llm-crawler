name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test

  deploy-spa:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: cd packages/web && npx vite build
      - run: aws s3 sync packages/web/dist s3://${{ secrets.SPA_BUCKET }} --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build -t ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }} -t ${{ secrets.ECR_REPOSITORY_URL }}:latest -f packages/api/Dockerfile .
          docker push ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REPOSITORY_URL }}:latest
      - run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment

  deploy-lambdas:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lambda: [crawler, consumer, generator, monitor]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: |
          if [ "${{ matrix.lambda }}" = "crawler" ]; then
            npx esbuild packages/${{ matrix.lambda }}/src/index.ts --bundle --platform=node --target=node20 --format=cjs --outfile=/tmp/${{ matrix.lambda }}.js --external:@aws-sdk/* --external:playwright
          else
            npx esbuild packages/${{ matrix.lambda }}/src/index.ts --bundle --platform=node --target=node20 --format=cjs --outfile=/tmp/${{ matrix.lambda }}.js --external:@aws-sdk/* --external:playwright --external:.prisma/client --external:@prisma/client
          fi
      - run: |
          mkdir -p /tmp/lambda-${{ matrix.lambda }}
          cp /tmp/${{ matrix.lambda }}.js /tmp/lambda-${{ matrix.lambda }}/index.js
          # Include Prisma client + engine for lambdas that need it
          if [ "${{ matrix.lambda }}" != "crawler" ]; then
            mkdir -p /tmp/lambda-${{ matrix.lambda }}/node_modules/@prisma/client /tmp/lambda-${{ matrix.lambda }}/node_modules/.prisma/client
            cp -r node_modules/@prisma/client/* /tmp/lambda-${{ matrix.lambda }}/node_modules/@prisma/client/
            cp -r node_modules/.prisma/client/* /tmp/lambda-${{ matrix.lambda }}/node_modules/.prisma/client/
          fi
          cd /tmp/lambda-${{ matrix.lambda }} && zip -r $GITHUB_WORKSPACE/${{ matrix.lambda }}.zip .
      - run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.PROJECT }}-${{ secrets.ENVIRONMENT }}-${{ matrix.lambda }} \
            --zip-file fileb://${{ matrix.lambda }}.zip

  terraform:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: terraform init
      - run: terraform apply -auto-approve -var="jwt_secret=${{ secrets.JWT_SECRET }}" -var="db_password=${{ secrets.DB_PASSWORD }}"
